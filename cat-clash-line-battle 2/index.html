<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Clash Line Battle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <p class="eyebrow">Line Battle Prototype</p>
        <h1>Cat Clash</h1>
        <p class="intro">
          냥코대전쟁 느낌의 횡스크롤 라인 전투 프로토타입입니다. 코스트를 모아 고양이 유닛을
          보내고, 적 기지를 먼저 무너뜨리세요.
        </p>
        <div class="control-list">
          <span><strong>1</strong> 탱크냥</span>
          <span><strong>2</strong> 검사냥</span>
          <span><strong>3</strong> 캐논냥</span>
          <span><strong>Q</strong> 수입 강화</span>
          <span><strong>R</strong> 재시작</span>
          <span><strong>F</strong> 전체화면</span>
        </div>
        <button id="start-btn" class="start-btn" type="button">전투 시작</button>
      </section>

      <section class="game-panel">
        <header class="hud-bar">
          <div>
            <p class="label">Player Base</p>
            <p id="player-base-text" class="value">1200 / 1200</p>
          </div>
          <div class="hud-center">
            <p class="label">Cost / Income</p>
            <p id="resource-text" class="value">220 / 360 · +22/s</p>
          </div>
          <div class="align-right">
            <p class="label">Enemy Base</p>
            <p id="enemy-base-text" class="value">1200 / 1200</p>
          </div>
        </header>

        <div class="canvas-frame">
          <canvas id="game" width="1280" height="720" aria-label="Line battle game"></canvas>
          <div id="overlay" class="overlay">
            <div class="overlay-card">
              <h2 id="overlay-title">전투 준비</h2>
              <p id="overlay-message">
                버튼이나 숫자키로 유닛을 뽑아 적 기지를 밀어보세요.
              </p>
            </div>
          </div>
        </div>

        <section class="summon-panel">
          <button class="unit-btn" data-unit="tank" type="button">
            <span>1. 탱크냥</span>
            <strong>90</strong>
            <small>튼튼한 전열</small>
          </button>
          <button class="unit-btn" data-unit="sword" type="button">
            <span>2. 검사냥</span>
            <strong>140</strong>
            <small>밸런스 근접 딜</small>
          </button>
          <button class="unit-btn" data-unit="cannon" type="button">
            <span>3. 캐논냥</span>
            <strong>220</strong>
            <small>후방 원거리</small>
          </button>
          <button id="upgrade-btn" class="unit-btn upgrade-btn" type="button">
            <span>Q. 수입 강화</span>
            <strong id="upgrade-cost-text">120</strong>
            <small>초당 수입 +6</small>
          </button>
        </section>

        <footer class="status-bar">
          <p id="status-text">Start를 누르면 전투가 시작됩니다.</p>
        </footer>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
